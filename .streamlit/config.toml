# .streamlit/config.toml
[theme]
primaryColor = "#1E88E5"          # A rich blue
backgroundColor = "#0E1117"       # Dark background
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"
base = "dark"                     # Use dark mode by default

[server]
maxUploadSize = 200               # Allow PDFs up to 200 MB
enableCORS = false